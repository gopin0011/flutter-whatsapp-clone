name: whatsapp_ui
description: A new Flutter project.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0

  # State & UI
  flutter_platform_widgets: ^2.1.0
  flutter_riverpod: ^2.5.1
  country_picker: ^2.0.24
  image_picker: ^1.1.2
  flutter_contacts: ^1.1.9+1
  uuid: ^4.5.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1

  # Media & Audio
  cached_video_player_plus: ^3.0.1
  emoji_picker_flutter: ^4.4.0
  giphy_get: ^3.6.1+1
  flutter_sound: ^9.18.0
  path_provider: ^2.1.4
  permission_handler: ^12.0.1
  audioplayers: ^6.6.0

  # Chat
  swipe_to: ^1.0.2
  story_view: ^0.16.0

  # Agora - Pakai versi ini dulu (paling kompatibel)
  agora_rtc_engine: ^6.5.3

  # Networking
  dio: ^5.7.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/backgroundImage.png
    - assets/bg.png